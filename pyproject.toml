[project]
name = "pdf2md"
version = "0.1.0-dev"
description = "Conversor PDF↔MD com round-trip mensurável e otimização adaptativa de imagens"
authors = [
    { name = "Leonardo Marques de Souza", email = "leonardo.marques.souza@gmail.com" }
]
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"

# Deps stripped 2026-05-09 para normalização canon (Python 3.13 + uv).
# Conflito original: marker-pdf 1.10.x exige pillow<11 mas projeto pedia pillow>=11.
# Re-adicionar caso a caso via `uv add` quando voltar a usar.
dependencies = []

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
# pytest é exceção — não tem env var oficial; explicitamos
cache_dir = "Z:\\caches\\pytest"

[dependency-groups]
dev = [
    "pip>=26.1.1",
    "setuptools>=82.0.1",
    "wheel>=0.47.0",
]
