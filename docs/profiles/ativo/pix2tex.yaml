algoritmo:
  id: pix2tex
  nome: "pix2tex (LaTeX-OCR dedicado)"
  versao: "weights v0.0.1"
  tipo: extractor
  estado: testado
  particao: ativo
  lab_origem: [lab/e18_vlm_formula_isolada, lab/e21_cpu_formula_cropper, lab/e24_gt_sintetico]
  medido_em: 2026-06-10
  licenca: MIT
  dependencias_externas: offline   # ~150MB pesos baixados 1x, depois offline

dimensoes:
  velocidade_wall_full_doc:
    valor: N-A
    confianca: medido
    notas: "Não opera em documento — escopo é recorte (formula isolada)"

  uso_hardware_acelerador:
    valor: CPU-only
    pico_vram_mb: 0
    confianca: medido
    notas: "Funciona em CPU; pode usar GPU se torch detectar"

  uso_memoria_RAM_host:
    valor: 800
    unidade: MB
    confianca: estimado
    notas: "torch + transformers carregados; medir formalmente em Lab E2"

  tempo_cold_start:
    valor: 11.9
    unidade: s
    confianca: medido
    contexto: "primeira carga: 12s; download de pesos ~5s adicional"

  tempo_inferencia_unitario:
    valor: 6.5
    unidade: s/formula
    confianca: medido

  qualidade_prose_texto:
    valor: N-A
    confianca: medido
    notas: "Não extrai prose — só math"

  qualidade_math_semantica:
    valor_display_linha_unica: 0.80
    valor_matriz: 0.50
    unidade: sim_latex_normalizado
    confianca: medido
    contexto: "e21: display linha-única N=6 sim 0.80 (5/6 usáveis); matriz N=3 (onda 2) sim 0.50"
    sintetico_cross_renderer:        # e24 onda 4 (GT-por-construção, 24 fórmulas × 2 tipografias)
      display_katex: 0.852
      display_cm: 0.721
      matriz_katex: 0.384
      matriz_cm: 0.318
      multiline_katex: 0.645
      multiline_cm: 0.508
      confianca: medido
    notas: |
      CORRIGIDO de 1.0 (era N=1: só a matriz 4.12 do N&C em e18 — não generalizou).
      FRONTEIRA medida: bom em display linha-única (0.80), FRACO em matriz (0.50).
      - linha-única: erro residual do modelo ('f' itálico CM lido como \int/J — 5.17/5.27).
      - matriz: pix2tex TRUNCA eq longa (5.32: 3/6 matrizes ok depois corta) e embaralha
        2×2 (5.123 lida como \frac). Gargalo é o MODELO, não o cropper (detecção 3/3, crop limpo).
      Qualidade governada tb pelo crop — sweet spot medido: DPI=300, margem 4pt (e21).
      CONFIRMADO cross-renderer (e24 onda 4, pós-T192): display≫matriz reproduz nas
      DUAS tipografias (KaTeX 0.852/0.384; CM 0.721/0.318) — fraqueza é do modelo,
      independente de renderer. Display KaTeX (0.852) supera a âncora CM real (0.80):
      fontes KaTeX são até mais legíveis pro pix2tex. Multi-linha aligned/cases fica
      no meio (0.5-0.65).

  qualidade_tabelas:
    valor: N-A
    confianca: medido

  preservacao_numeros_citacoes:
    valor: N-A
    confianca: medido
    notas: "Inclui label '(4.12)' indesejado no output — pós-processar com regex"

  alucinacao_risco:
    valor: zero
    sinal: "output sempre relacionado à imagem; modelo dedicado treinado em corpus matemático"
    confianca: medido

  determinismo:
    valor: deterministico-com-seed
    confianca: estimado
    notas: "torch eval mode com temperature=0; medir variância em Lab E2"

  estabilidade_runtime:
    taxa_crash_pct: 0
    taxa_output_vazio_pct: 0
    confianca: medido
    contexto: "1 run em e18 sem incidente"

  granularidade_operacional:
    valor: recorte
    confianca: medido
    notas: "Crítico — opera em formula isolada (imagem cropada). Componível em pipeline híbrido"

  riqueza_formato_intermediario:
    valor: MD+LaTeX
    confianca: medido
    notas: "Output bruto é LaTeX puro; pode ser wrappado em $$...$$"

  cobertura_tipo_documento:
    livro: N-A
    paper_arxiv: N-A
    slides: N-A
    scan: N-A
    form_acroform: N-A
    confianca: medido
    notas: "Não classifica documento — opera em elemento"

  cobertura_tipo_elemento:
    prose: N-A
    math_inline: medio
    math_display: forte
    tabela: N-A
    figura_vetorial: N-A
    logo: N-A
    confianca: medido

  scaling_behavior:
    descricao: "constante por formula"
    pontos_medidos:
      - {n_formulas: 1, wall_s: 6.5}
    confianca: medido

dimensoes_que_vence:
  - qualidade_math_semantica                # 100% em matriz 2×2 complexa
  - alucinacao_risco                        # zero
  - dependencias_externas                   # offline 150MB
  - uso_hardware_acelerador                 # CPU-only viável
  - granularidade_operacional               # recorte → componível
  - tempo_cold_start                        # 11.9s (vs 30s Marker)

notas: |
  Vencedor para T134 (math image → LaTeX). Modelo dedicado treinado em corpus
  matemático. VLM general-purpose perdeu em todas dimensões nesta categoria (e18).

  Para pipeline híbrido CPU (e21): cropper ESTRUTURAL (pymupdf, sem torch/marker)
  detecta regiões display por fonte de delimitador grande (CMEX) + densidade-math +
  indentação → pix2tex extrai cada região como LaTeX. Granularidade "recorte" habilita
  isso SEM Marker — fecha o caminho `pdftotext + cropper + pix2tex` 100% CPU.

  Limitação conhecida:
  - Inclui label "(N.NN)" no output → o cropper já EXCLUI o span do label (e21).
  - `f` itálico do Computer Modern lido como \int / J (e21, 5.17/5.27) — frailty do modelo.
  - WER-LaTeX texto-level enganoso: pix2tex usa `\\left[\\begin{array}` em vez
    de `\\begin{bmatrix}` (equivalente semantico). Grade por render+SSIM seria mais justo.

evidencias:
  - path: lab/e18_vlm_formula_isolada/notes.md
    quote: "pix2tex semanticamente 100% correto, 4 VLMs falharam (N=1 — não generalizou)"
  - path: lab/e21_cpu_formula_cropper/notes.md
    quote: "N=6: recall detecção 6/6, sim médio 0.80, 5/6 usáveis; crop @300dpi/4pt é a alavanca"
  - path: tickets/closed/T065_corpus_gt_sintetico.md
    quote: "fraqueza de matrizes REAPARECE nos 2 renderers (display−matriz: 0.47 KaTeX, 0.40 CM)"
