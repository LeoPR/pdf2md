algoritmo:
  id: marker
  nome: "Marker 1.10.2"
  versao: "1.10.2"
  tipo: extractor
  estado: testado
  particao: ativo
  lab_origem:
    - lab/e00_baseline_marker
    - lab/e14_pixel_roundtrip_cross_pdf
    - lab/e24_gt_sintetico
  medido_em: 2026-06-10
  licenca: GPL-3
  dependencias_externas: download-on-demand   # Surya + Texify + Equation models

dimensoes:
  velocidade_wall_full_doc:
    valor: 12.9
    unidade: s/pg
    confianca: medido
    contexto: "N&C cap4 ~50pg em RTX 3060 12GB = 645s total"

  uso_hardware_acelerador:
    valor: GPU-required
    pico_vram_mb: 3400
    confianca: medido
    notas: "Surya é GPU-only; CPU fallback inviável"

  uso_memoria_RAM_host:
    valor: 1500
    unidade: MB
    confianca: estimado

  tempo_cold_start:
    valor: 30
    unidade: s
    confianca: estimado
    notas: "carregar Surya+Texify+Equation; medir formalmente em Lab E2"

  tempo_inferencia_unitario:
    valor: 12.5
    unidade: s/pg
    confianca: medido

  qualidade_prose_texto:
    valor: 0.9509
    unidade: token_similarity
    confianca: medido
    contexto: "round-trip N&C cap4 baseline (e00)"

  qualidade_math_semantica:
    valor: alto
    confianca: medido
    contexto: "e24 sintético (GT-por-construção): display 0.973, matriz 0.986 sim-LaTeX"
    notas: |
      MAS degrada em multi-linha aligned/cases: 0.681 (e24) — modo de falha
      mensurável inédito, achado pelo corpus sintético. WER vs GT humano de
      doc real segue pendente (T060, tier privado).

  qualidade_tabelas:
    valor_grid_align_multilinha_zebra: 1.0
    valor_spans: 0.749
    unidade: TEDS
    confianca: medido
    contexto: "e25/T075 (sintético born-digital Chrome, 15 docs): T1 grid, T2 align+números, T3 multilinha, T5 borderless/zebra = 1.000; T4 row/colspan = 0.749"
    notas: |
      0.749 em spans é o TETO do formato pipe-table — TEDS(marker) ==
      TEDS(best-pipe) POR ITEM (4 casas): a perda é do markdown-transporte
      (T440), não do extractor. Escopo honesto: render born-digital (Chrome)
      de templates próprios; tabela LaTeX/booktabs e scan NÃO medidas.

  preservacao_numeros_citacoes:
    valor: alto
    confianca: estimado

  alucinacao_risco:
    valor: medio
    sinal: "bloat_ratio > 2.0× + densidade < 200 tok/pg (T071)"
    confianca: medido
    contexto: "Wilson 1800 e03 bloat 7.7×; Atkins ok com text-layer"

  determinismo:
    valor: deterministico-com-seed
    confianca: medido
    notas: "bit-for-bit reprodutível com mesma versão + seed (T108)"

  estabilidade_runtime:
    taxa_crash_pct: 0
    taxa_output_vazio_pct: 0
    confianca: medido
    contexto: "10+ runs e00-e14 sem crash silencioso"

  granularidade_operacional:
    valor: documento
    confianca: medido

  riqueza_formato_intermediario:
    valor: MD+LaTeX
    confianca: medido

  cobertura_tipo_documento:
    livro: forte
    paper_arxiv: forte
    slides: fraco
    scan: fraco
    form_acroform: fraco
    confianca: medido

  cobertura_tipo_elemento:
    prose: forte
    math_inline: forte
    math_display: forte
    tabela: forte             # e25/T075: no teto do formato (TEDS 1.0/0.749=teto); LaTeX/scan pendente
    figura_vetorial: perde    # e24: texto VETORIAL interno (labels mermaid/SVG) = 0% recuperado
    logo: medio
    confianca: medido
    notas: |
      INVERSÃO medida (e24): o layout model classifica a região como figura e
      DESCARTA o texto vetorial interno — recall 0.000 vs pdftotext 1.000 nas
      categorias diagrama/logo. Para indexação, doc rico em diagramas pode
      indexar MELHOR pelo caminho CPU (insumo T092/roteador).

  scaling_behavior:
    descricao: "linear em n_paginas, validado até 704pg"
    pontos_medidos:
      - {n_paginas: 5, wall_s: 30}
      - {n_paginas: 50, wall_s: 645}
      - {n_paginas: 704, wall_s: 6828}
    confianca: medido

dimensoes_que_vence:
  - velocidade_wall_full_doc                # único extrator full-doc viável end-to-end
  - qualidade_prose_texto                   # 95.09% baseline
  - cobertura_tipo_documento.livro          # forte
  - cobertura_tipo_documento.paper_arxiv    # forte
  - riqueza_formato_intermediario           # MD+LaTeX > texto puro
  - estabilidade_runtime                    # 0% crash em 10+ runs

notas: |
  Baseline insubstituível v0.7.0. Único extrator full-doc end-to-end testado em
  produção (704pg N&C completo em 1h54). Round-trip 95.09% bate histórico
  exato (T104).

  Modos de falha conhecidos:
  - bloat_ratio > 2× em PDFs sparse (re-OCR alucinante, padrão Wilson e03)
  - Escapes markdown auto penalizam round-trip textual em formulários AcroForm (e05)
  - Tabelas TEDS não medido formalmente — pendente T060/T410
  - Math multi-linha (aligned/cases) degrada a 0.681 vs 0.97-0.99 em
    display/matriz simples (e24 sintético)
  - Texto vetorial DENTRO de figuras é descartado pelo layout model — 0% de
    recall em diagrama/logo, vs 100% do pdftotext (e24; insumo T092)

  Comparação contra Nougat/MinerU/olmOCR-2/Docling pendente T410 (precisa GT humano T060 primeiro).

evidencias:
  - path: lab/e00_baseline_marker/RESULT.md
    quote: "round-trip 95.09% em cap 4 N&C, wall 645s, VRAM peak 3.4GB"
  - path: lab/e14_pixel_roundtrip_cross_pdf/README.md
    quote: "generaliza em 3 categorias além N&C, WER med 0.26-0.42"
  - path: tickets/closed/T108_pacote_conversor_readme.md
    quote: "Validação em produção N&C completo: 1h54min, 21/21 capítulos bit-for-bit reprodutíveis"
  - path: tickets/closed/T065_corpus_gt_sintetico.md
    quote: "marker degrada em multi-linha 0.681; inversão diagrama/logo: pdftotext 1.000 × marker 0.000"
