algoritmo:
  id: pdftotext
  nome: "pdftotext / PyMuPDF text-layer / Tesseract (fallback CPU-only)"
  versao: "pdftotext 24.x; PyMuPDF 1.27.x; Tesseract 5.x"
  tipo: extractor
  estado: previsto
  particao: inferido
  lab_origem: nao_testado_ainda    # PyMuPDF text-layer foi usado como baseline em e15/e17, mas não como pipeline completo
  medido_em: nao_medido
  licenca: GPL-2     # pdftotext (poppler) GPL-2; PyMuPDF AGPL-3 ou comercial; Tesseract Apache-2.0
  dependencias_externas: offline

dimensoes:
  velocidade_wall_full_doc:
    valor: 2
    unidade: s/50pg
    confianca: estimado
    notas: "pdftotext é instant para text-layer; Tesseract ~3-5s/pg para scan"

  uso_hardware_acelerador:
    valor: CPU-only
    pico_vram_mb: 0
    confianca: medido     # PyMuPDF usado em e15/e17 como baseline

  uso_memoria_RAM_host:
    valor: 50
    unidade: MB
    confianca: estimado

  tempo_cold_start:
    valor: 0.1
    unidade: s
    confianca: medido

  tempo_inferencia_unitario:
    valor: 0.04
    unidade: s/pg
    confianca: estimado

  qualidade_prose_texto:
    valor: medio
    confianca: medido
    contexto: "PyMuPDF baseline em pg03 GT: WER-prosa 0.147 (texto OK, perde estrutura)"

  qualidade_math_semantica:
    valor: baixo
    confianca: medido
    notas: "Math vem como Unicode cru (e.g. α em vez de \\alpha) — sem conversão para LaTeX"

  qualidade_tabelas:
    valor: fraco
    confianca: estimado
    notas: "pdftotext perde grade; pdftotext -layout preserva alinhamento mas não estrutura"

  preservacao_numeros_citacoes:
    valor: alto
    confianca: medido
    notas: "Text-layer extraction preserva números literais"

  alucinacao_risco:
    valor: zero
    sinal: "extração determinística de text-layer; sem ML"
    confianca: medido

  determinismo:
    valor: deterministico-com-seed
    confianca: medido

  estabilidade_runtime:
    taxa_crash_pct: 0
    taxa_output_vazio_pct: 0
    confianca: medido
    contexto: "PyMuPDF usado dezenas de vezes sem incidente"

  granularidade_operacional:
    valor: documento
    confianca: medido

  riqueza_formato_intermediario:
    valor: texto-puro
    confianca: medido
    notas: "Diferencial relevante para visão macro propriedade #2 — perde tudo de estrutura/math/tabela"

  cobertura_tipo_documento:
    livro: medio          # text-layer livro digital OK; perde headers
    paper_arxiv: medio
    slides: alto           # slides geralmente simples
    scan: forte            # Tesseract é OCR, único caminho sem GPU
    form_acroform: alto    # forms são text-layer puro
    confianca: estimado

  cobertura_tipo_elemento:
    prose: forte
    math_inline: baixo
    math_display: baixo
    tabela: medio
    figura_vetorial: nao_medido
    logo: nao_medido
    confianca: estimado

dimensoes_que_vence:   # esperados se Lab E1 confirmar
  - uso_hardware_acelerador             # único CPU-only end-to-end viável (Marker GPU-required)
  - velocidade_wall_full_doc            # ~325× mais rápido que Marker em text-layer
  - uso_memoria_RAM_host                # ~30× menos RAM
  - dependencias_externas               # offline
  - alucinacao_risco                    # zero
  - preservacao_numeros_citacoes        # alto (text-layer literal)
  - estabilidade_runtime                # 0% crash

notas: |
  COBRE BURACO #1 IDENTIFICADO PELO WORKFLOW: "extrator CPU-only end-to-end viável".

  Lab E1 prioritário (~3-4h): testar pdftotext + PyMuPDF + Tesseract end-to-end em:
  - N&C cap4 (text-layer denso, math LaTeX nativo) — vs Marker baseline
  - 1 PDF scan-only (Wilson 1800 ou equivalente) — Tesseract validação
  - 1 paper arxiv (2-col) — PyMuPDF/pdftotext compare

  Reportar: RSS pico sistemático (cobre buraco #2), WER-prosa vs GT humano,
  cobertura de math/tabela/headers.

  Após Lab E1, promover para `ativo/` se ≥5 dimensões medidas com confiança alta
  e ≥1 dimensão vencida. Strong candidate: --rapido + --low-resource intents do T090.

  Atenção licença: PyMuPDF AGPL-3 (forte copyleft) ou comercial. Considerar
  pdftotext (poppler GPL-2) ou pdfplumber (MIT) como alternativas.

evidencias:
  - path: lab/e15_gt_validation/run.py
    quote: "PyMuPDF text-layer como baseline para grade"
  - path: lab/e17_vlm_full_page/02_grade.py
    quote: "extract_baseline via fitz.get_text()"
  - path: tickets/research/T420_fallback_low_resource_sem_gpu_sem_modelos_ml_pesados.md
    quote: "fallback CPU-only sem GPU"
